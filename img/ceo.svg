<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 200" width="30" height="60">
  <defs>
    <linearGradient id="ceoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#dc2626" />
      <stop offset="30%" stop-color="#ef4444" />
      <stop offset="70%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#991b1b" />
    </linearGradient>
    <linearGradient id="ceoBase" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1f2937" />
      <stop offset="50%" stop-color="#374151" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
  </defs>
  
  <!-- Corpo vermelho (cilindro principal) -->
  <rect x="25" y="20" width="50" height="120" rx="25" ry="10" fill="url(#ceoGrad)" />
  
  <!-- Anéis em relevo horizontais -->
  <path d="M24 50 Q 50 55 76 50" fill="none" stroke="#dc2626" stroke-width="3" />
  <path d="M24 70 Q 50 75 76 70" fill="none" stroke="#dc2626" stroke-width="3" />
  <path d="M24 90 Q 50 95 76 90" fill="none" stroke="#dc2626" stroke-width="3" />
  <path d="M24 110 Q 50 115 76 110" fill="none" stroke="#dc2626" stroke-width="3" />

  <!-- Base preta e conectores -->
  <!-- Colar da base -->
  <ellipse cx="50" cy="140" rx="35" ry="10" fill="url(#ceoBase)" />
  <!-- Cabos saindo da base -->
  <rect x="35" y="145" width="10" height="30" rx="2" fill="url(#ceoBase)" />
  <rect x="55" y="145" width="10" height="30" rx="2" fill="url(#ceoBase)" />
</svg>
